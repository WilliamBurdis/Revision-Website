<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeForge | GitHub Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">GradeForge</div>
    <button class="primary-btn" onclick="toggleTheme()" id="theme-toggle">🌙 Dark Mode</button>
</nav>

<main id="app">
    <section id="home-screen">
        <h1>My Dashboard</h1>
        <div class="subject-grid">
            <div class="subject-card" onclick="openSubject('eng')">
                <h3>📚 English</h3>
                <p>Literature & Language Master</p>
            </div>
            <div class="subject-card" onclick="openSubject('math')">
                <h3>📐 Mathematics</h3>
                <p>Complete Question Bank</p>
            </div>
        </div>
    </section>

    <section id="study-screen" class="hidden">
        <button class="primary-btn" onclick="goHome()">← Back</button>
        <h1 id="subject-title"></h1>
        
        <div class="tabs">
            <button id="tab-notes" class="tab-btn active" onclick="switchTab('notes')">Notes</button>
            <button id="tab-quiz" class="tab-btn" onclick="switchTab('quiz')">Questions</button>
        </div>

        <div id="view-notes" class="content-box">
            <div id="note-body"></div>
        </div>

        <div id="view-quiz" class="content-box hidden">
            <h3 id="question-text"></h3>
            <div id="options-container"></div>
            <p id="feedback-text"></p>
            <button id="next-btn" class="primary-btn hidden" onclick="nextQuestion()">Next Question</button>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
