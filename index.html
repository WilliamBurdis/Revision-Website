<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeForge | Master</title>
    <style>
        :root { 
            --bg-color: #f4f7f6; 
            --text-color: #333; 
            --card-bg: #ffffff; 
            --accent: #3498db; 
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body.dark-mode { 
            --bg-color: #1a1a1a; 
            --text-color: #e0e0e0; 
            --card-bg: #2d2d2d; 
            --accent: #2980b9; 
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-family); 
            margin: 0; padding: 0; 
            transition: 0.3s; 
        }

        nav { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: var(--card-bg); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        main { max-width: 900px; margin: 30px auto; padding: 0 20px; }

        .subject-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; 
        }

        .subject-card { 
            background: var(--card-bg); padding: 25px; border-radius: 12px; 
            text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: 0.2s; border: 2px solid transparent; 
        }
        .subject-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .tabs { display: flex; gap: 10px; margin: 20px 0; }
        .tab-btn { 
            flex: 1; padding: 12px; border: none; background: #ccc; 
            color: #333; cursor: pointer; border-radius: 5px; font-weight: bold; 
        }
        .tab-btn.active { background: var(--accent); color: white; }

        .tab-content { 
            display: none; background: var(--card-bg); padding: 25px; 
            border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .tab-content.active { display: block; }

        .hidden { display: none !important; }

        .quiz-opt { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: var(--bg-color); color: var(--text-color);
            border: 1px solid #ccc; border-radius: 5px; cursor: pointer; 
            text-align: left; font-size: 1rem;
        }

        button.primary-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; 
            font-weight: bold; font-size: 1rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">GradeForge</div>
        <button id="theme-toggle" class="primary-btn" onclick="toggleTheme()">🌙 Dark Mode</button>
    </nav>

    <main id="app">
        <section id="homepage">
            <h1>My Dashboard</h1>
            <div class="subject-grid">
                <div class="subject-card" onclick="loadSubject('english')">
                    <h3>📚 English</h3>
                    <p>Complete Literature & Language</p>
                </div>
                <div class="subject-card" onclick="loadSubject('maths')">
                    <h3>📐 Mathematics</h3>
                    <p>Full Exam Question Bank</p>
                </div>
            </div>
        </section>

        <section id="study-view" class="hidden">
            <button class="primary-btn" onclick="goHome()">← Back</button>
            <h1 id="subject-title"></h1>
            
            <div class="tabs">
                <button class="tab-btn active" id="notes-tab-btn" onclick="switchTab('notes')">Notes</button>
                <button class="tab-btn" id="quiz-tab-btn" onclick="switchTab('quiz')">Questions</button>
            </div>

            <div id="notes" class="tab-content active">
                <div id="note-text"></div>
            </div>

            <div id="quiz" class="tab-content">
                <div id="quiz-container">
                    <h3 id="q-text"></h3>
                    <div id="q-options"></div>
                    <div id="q-feedback" style="margin-top:15px; font-weight:bold;"></div>
                    <button id="next-btn" class="hidden primary-btn" onclick="nextQuestion()" style="margin-top:20px; width:100%;">Next Question</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const database = {
            english: {
                title: "GCSE English",
                notes: "<h3>Course Overview</h3><ul><li><b>Macbeth:</b> Ambition and Guilt.</li><li><b>Christmas Carol:</b> Poverty and Redemption.</li><li><b>Language:</b> Focus on Paper 1 (Fiction) and Paper 2 (Non-Fiction).</li></ul>",
                questions: [
                    { q: "What is Macbeth's fatal flaw?", opts: ["Greed", "Ambition", "Cowardice"], correct: 1, exp: "His 'vaulting ambition' drives the tragedy." },
                    { q: "Who is the 'ghost' of the future in A Christmas Carol?", opts: ["Marley", "Ghost of Christmas Yet to Come", "Fred"], correct: 1, exp: "This ghost shows Scrooge his lonely death." },
                    { q: "Define 'Onomatopoeia'.", opts: ["Word sounds like its meaning", "A comparison using like", "Extreme exaggeration"], correct: 0, exp: "Words like 'Bang' or 'Hiss'." }
                ]
            },
            maths: {
                title: "GCSE Mathematics",
                notes: "Question Bank Active.",
                questions: [
                    { q: "Solve 5x = 40", opts: ["x=5", "x=8", "x=10"], correct: 1, exp: "40 / 5 = 8." },
                    { q: "What is 15% of 200?", opts: ["15", "30", "45"], correct: 1, exp: "10% is 20, 5% is 10. Total 30." },
                    { q: "Simplify x³ * x²", opts: ["x⁵", "x⁶", "2x⁵"], correct: 0, exp: "Add the indices: 3 + 2 = 5." },
                    { q: "Solve: x + 12 = 30", opts: ["18", "42", "20"], correct: 0, exp: "30 - 12 = 18." },
                    { q: "Area of a rectangle (L=5, W=10)?", opts: ["15", "50", "30"], correct: 1, exp: "Length * Width = 50." },
                    { q: "What is √81?", opts: ["7", "8", "9"], correct: 2, exp: "9 * 9 = 81." },
                    { q: "1/2 + 1/4 = ?", opts: ["2/6", "3/4", "1/6"], correct: 1, exp: "0.5 + 0.25 = 0.75." },
                    { q: "Angles in a quadrilateral sum to?", opts: ["180°", "360°", "270°"], correct: 1, exp: "Squares, rectangles, etc., sum to 360." }
                ]
            }
        };

        let currentKey = '';
        let qIdx = 0;

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-toggle').innerText = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
        }

        function loadSubject(key) {
            currentKey = key;
            qIdx = 0;
            document.getElementById('homepage').classList.add('hidden');
            document.getElementById('study-view').classList.remove('hidden');
            document.getElementById('subject-title').innerText = database[key].title;
            document.getElementById('note-text').innerHTML = database[key].notes;
            
            if(key === 'maths') {
                switchTab('quiz');
                document.getElementById('notes-tab-btn').classList.add('hidden');
            } else {
                switchTab('notes');
                document.getElementById('notes-tab-btn').classList.remove('hidden');
            }
            renderQuestion();
        }

        function goHome() {
            document.getElementById('homepage').classList.remove('hidden');
            document.getElementById('study-view').classList.add('hidden');
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById(t + '-tab-btn').classList.add('active');
        }

        function renderQuestion() {
            const data = database[currentKey].questions[qIdx];
            document.getElementById('q-text').innerText = data.q;
            document.getElementById('q-feedback').innerText = '';
            document.getElementById('next-btn').classList.add('hidden');
            
            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = '';
            data.opts.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'quiz-opt';
                b.innerText = o;
                b.onclick = () => checkAns(i);
                optDiv.appendChild(b);
            });
        }

        function checkAns(i) {
            const data = database[currentKey].questions[qIdx];
            const feed = document.getElementById('q-feedback');
            document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
            
            if(i === data.correct) {
                feed.innerHTML = "<span style='color:green'>✅ Correct!</span> " + data.exp;
            } else {
                feed.innerHTML = "<span style='color:red'>❌ Incorrect.</span> " + data.exp;
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            qIdx++;
            if(qIdx < database[currentKey].questions.length) {
                renderQuestion();
            } else {
                document.getElementById('quiz-container').innerHTML = "<h3>Mastery Achieved!</h3><button class='primary-btn' onclick='goHome()'>Back to Dashboard</button>";
            }
        }
    </script>
</body>
</html>
