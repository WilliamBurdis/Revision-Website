<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeForge | Study Suite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">GradeForge</div>
    <button class="primary-btn" onclick="toggleTheme()" id="theme-toggle">🌙 Dark Mode</button>
</nav>

<main id="app">
    <section id="home">
        <h1>My Dashboard</h1>
        <div class="subject-grid">
            <div class="subject-card" onclick="loadSubject('eng')">
                <h3>📚 English</h3>
                <p>Literature & Language</p>
            </div>
            <div class="subject-card" onclick="loadSubject('math')">
                <h3>📐 Mathematics</h3>
                <p>Algebra & Geometry</p>
            </div>
            <div class="subject-card" onclick="loadSubject('sci')">
                <h3>🧬 Science</h3>
                <p>Combined Science (Edexcel)</p>
            </div>
        </div>
    </section>

    <section id="study" class="hidden">
        <button class="primary-btn" onclick="goHome()">← Back</button>
        <h1 id="sub-title">Subject Title</h1>
        
        <div class="tabs">
            <button id="t-notes" class="tab-btn active" onclick="setTab('notes')">Notes</button>
            <button id="t-flash" class="tab-btn" onclick="setTab('flash')">Flashcards</button>
        </div>

        <div id="v-notes" class="content-box">
            <div id="note-body">Select a subject to see your notes.</div>
        </div>

        <div id="v-flash" class="content-box hidden">
            <div id="flash-filters" class="filter-group hidden">
                <button class="filter-btn active" onclick="filterCards('ALL')">All</button>
                <button class="filter-btn" onclick="filterCards('BIOLOGY')">Bio</button>
                <button class="filter-btn" onclick="filterCards('CHEMISTRY')">Chem</button>
                <button class="filter-btn" onclick="filterCards('PHYSICS')">Phys</button>
            </div>

            <div class="flashcard-box">
                <div class="card-part front-part">
                    <small id="f-topic">QUESTION</small>
                    <div id="f-front">Loading cards...</div>
                </div>
                <div class="card-part back-part" id="f-back-wrapper" style="display:none;">
                    <small>ANSWER</small>
                    <div id="f-back"></div>
                </div>
            </div>

            <div class="flash-controls">
                <button class="primary-btn" id="reveal-btn" onclick="toggleAnswer()">Show Answer</button>
                <button class="primary-btn next-btn" onclick="handleNextCard()">Next Card →</button>
                <button class="primary-btn shuffle-btn" onclick="shuffleCurrentDeck()">🔀 Shuffle Deck</button>
            </div>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
